body:
  text: 案元史志奉元術積年八千三百一十八萬五千二百七十七以熙寕七年距至元十八年積二百七年減之得此積年元法二萬三千七百注曰此日法見元史志名日法爲元法用明天術例歲周八百六十五萬六千二百七十三注曰案奉元術行用在明天術後則奉元歲周當與明天相近明天術元法三萬九千斗分九千五百置明天斗分以明天元法退除之得二十四刻三十五分八十九秒七十四小分以奉元元法乘之得五千七百七十三分七秒六十八小分三十八小秒秒以下不滿半分去之得五千七百七十三爲奉元斗分以奉元元法乘三百六十五日得八百六十五萬五百加入奉元斗分得此歲周歲餘一十二萬四千二百七十三朔實六十九萬九千八百七十五注曰案何承天調日法以四十九分之二十六爲疆率十七分之九爲弱率今㨿此率立法以求奉元朔實置元法二萬三千七百以疆母四十九去之餘三十三以四百四十二乘之得一萬四千五百八十六滿八百三十三去之餘四百二十五爲弱實以弱母十七除之得二十五爲弱數以弱實返減日法餘二萬三千二百七十五爲疆實以疆母四十九除之得四百七十五爲彊數以彊子二十六乘彊數得一萬二千三百五十列上位以弱子九乘弱數得二百二十五加上位得一萬二千五百七十五爲奉元朔餘以元法乘二十九日得六十八萬七千三百加入朔餘得此朔實又以演紀法覆考之置積年八千三百一十八萬五千七十加十年得八千三百一十八萬五千八十爲上元甲子距熙寕甲寅後甲子積年以歲周乘之得七百二十萬七百二十七億六千二百萬六千八百四十爲氣積分副之以六十乘元法得一百四十二萬二千去之餘一百萬二千八百四十則當時所定甲子年氣骨也以朔實去其副餘九萬四千二百一十五則當時所定甲子年閏骨也演紀法先以元法斗分用求一術入之置斗分五千七百七十三於右上元法二萬三千七百
