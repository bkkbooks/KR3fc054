body:
  text: 於右下立天元一於左上空其左下以右上五千七百七十三除右下二萬三千七百得四為下商右下餘六百八以下商四乘左上天元一得四歸於左下即棄去下商四又以右下六百八除右上五千七百七十三得九為上商右上餘三百一以上商九乘左下四得三十六歸入左上一得左上三十七即棄去上商九又以右上三百一除右下六百八得二為下商右下餘六以下商二乘左上三十七得七十四歸入左下四得左下七十八即棄去下商二又以右下六除右上三百一得五十為上商右上餘一以上商五十乘左下七十八得三千九百歸入左上三十七得左上三千九百三十七即棄去上商五十又以右上一除右下六得五為下商此術不可除盡須令有餘故一除六得五右下餘一以下商五乘左上三千九百三十七得一萬九千六百八十五歸入左下七十八得左下一萬九千七百六十三即棄去下商五驗右上右下俱一即以一為等率左上三千九百三十七為因率以左上三千九百三十七與左下一萬九千七百六十三相加得二萬三千七百為蔀率又以紀法六十乘等率仍得六十為約率以約氣骨得一萬六千七百一十四以因率乘之得六千五百八十萬三千一十八滿蔀率去之餘一萬一千八百一十八以六十乘之得七十萬九千八十為入元歲以歲閏乘之得一千八百二十七億八千一百六十七萬八千八百四十滿朔實去之餘二十二萬四千二百十五為入閏以減閏骨不足減於閏骨上加一朔實得七十九萬四千九十乃以入閏減之餘五十六萬九千八百七十五為閏縮又以六十乘蔀率得一百四十二萬二千為氣元率以歲閏乘之得三千六百六十五億五千三百二十萬六千滿朔實去之餘六十七萬三千五百為元閏次以朔實元閏用求一術入之置元閏六十七萬三千五百於右上朔實六十九萬九千八百七十五於右下立天元一於左上空其左下以右上六十七萬三千五百除右下六十九萬九千八百七十五得一為下商右下餘二萬六千三百七十五以下商一乘左上天元一得一歸於左下即棄去下商一又以右下二萬六千三百七十五除右上六十七萬三千五百得二十五為上商右上餘一萬四千一百二十五以上商二十五乘左下一得二十五歸入左上一得左上二十六即棄去上
  hash: sha256:723d6a4fecbf41b8c90c7c60091e73baaa8ce1d611aa6bb791e9f96856d32d67
