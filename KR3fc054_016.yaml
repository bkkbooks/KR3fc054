body:
  text: 加之為次候又加之為末候各命甲子算外即得其候日辰求六十四卦各因中氣大小餘命之為公卦用事日以卦策加之即次卦用事日以土王策加諸侯之卦得十有二節之初外卦用事日求五行用事日各因四立之節大小餘命之即春木夏火秋金冬水首用事日以土王䇿減四季中氣大小餘命甲子算外即其月土始用事日也常氣月中節內正卦初候中候末候始卦中卦末卦冬至十二月中坎初六蚯蚓結麋角解水果動公中孚辟復侯屯內小寒十二月節坎兒二鴈北鄉鵲始巢雉始雊侯屯外大夫謙卿暌大寒十二月中坎六三雞始乳鷙鳥厲疾水澤腹堅公升辟臨侯小過內立春正月節坎六四東風解凍蟄蟲始振魚上冰侯小過外大夫蒙卿益雨水正月中坎九五獺祭魚鴻鴈來草木萌動公漸辟泰侯需內驚蟄二月節坎桃始華倉庚嗚鷹化為鳩侯需外大夫隨卿晉春分二月中震初九元鳥至雷乃發聲始電公解辟大壯侯豫內清明三月節震六二桐始華田鼠化駕虹始見侯豫外大夫訟卿蠱穀雨三月中震六三萍始生鳴鳩拂羽載勝降桑公革辟夬侯旅內立夏四月節震兒六螻蟈嗚蚯蚓出王生侯旅外大夫師卿比小滿四月中震六五苦菜秀靡早死小暑至公小畜辟乾侯大有內
