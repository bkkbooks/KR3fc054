body:
  text: 芒種五月節震十六螳螂生始鳴反舌無聲侯大有外大夫家人卿井夏至五月中離初九鹿角解蜩始嗚半夏生公咸辟姤侯鼎內小暑六月節離六二溫風至蟋蟀居壁鷹乃學習侯鼎外大夫豐卿涣大暑六月中離九三腐草為螢土潤溽暑大雨時行公履辟遁侯恆內立秋七月節離九四涼風至白露降寒蟬嗚侯恆外大夫節卿同人處暑七月中離六五鷹乃祭烏天地始肅禾乃登公損辟否侯巽內白露八月節離上九鴻鴈來元鳥歸羣鳥養羞侯巽外大夫萃卿大秋分八月中兌初九雷乃收聲蟄蟲壞戶水始涸公賁辟觀侯歸妹內寒露九月節兌九二鴻鴈來賓雀水為蛤菊有黃華侯歸妹外大夫旡妄卿明夷霜降九月中兌六三脟乃祭獸草木黃落蟄蟲咸俯公困辟剝侯艮內立冬十月節兌九四水始冰地始凍雉入水為蜃侯艮外大夫既濟卿噬嗑小雪十月中兌九五虹藏不見天氣上騰地氣下降閉塞成冬公大過辟坤侯未濟內大雪十一月節兌上六鳥不嗚虎始交荔挺出侯未濟大夫蹇卿頤求發斂加時各置小餘滿辰法除之為辰數不滿者刻法而一為刻又不滿為分命辰數從子正算外即得所求加時辰刻若以半辰之數加而命之即得辰初後所入刻數求發斂去經朔置天正經朔閏餘以月閏纍加之即每月閏餘滿元法除之為閏日不盡為小餘即得其月中氣去經朔日及餘秒其閏餘滿閏限即為置閏以月內無中氣為定求卦候去經朔各以卦候䇿及餘秒纍加減之中氣前減
