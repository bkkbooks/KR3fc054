body:
  text: 弦䇿七餘九千六十八太氣䇿一十五餘五千一百七十八秒一十五中盈分一萬三百五十六秒三十朔虛分一萬一千一百二十五閏限六十七萬八千三百九十三秒三百三十歲閏二十五萬七千七百七十三月閏二萬一千四百八十一秒三十沒限一萬八千五百二十一秒三百四十五紀法六十秒母三百六十求天正冬至置所求積年以歲周乘之為天正冬至氣積分滿元法除之為積日不滿為小餘日盈紀法去之不盡命甲子算外即得所求年前天正冬至日辰及餘求次氣置天正冬至大小餘以氣策加之即得次氣大小餘若秒盈秒母從小餘小餘滿元法從大餘大餘滿紀法即去之命大餘甲子算外即次氣日辰及餘餘氣纍而求之求天正經朔置天正冬至氣積分滿朔實去之為積月不盡為閏餘盈元法為日不盈為餘以減天正冬至大小餘為天正經朔大小餘大餘不足減加紀法小餘不足減退大餘
