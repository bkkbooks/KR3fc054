body:
  text: 初仁宗朝用崇天秝至治平初司天監周琮改撰明天秝行之監生石道言未經測驗不可用不聽至熙寧元年七月望夜將旦月食東方與秝不協乃詔秝官雜𠊱星晷更造新秝終五年冬日行餘分略具會沈括提舉司天監言淮南人衛朴通秝法召朴至言崇天秝氣後天明天秝朔後天注日朔後天舊誤朔先天今改下文減二刻可證失在置元不當詔朴更造朴以已學為之視明天秝朔減二刻注日以明天術推熙寧七年甲寅歲前天正經朔積年七十一萬一千七百七十氣積分一十萬一千三百八十八億七百七十六萬五千閏餘五十一萬八千九百五十八朔積分一十萬一千三百八十八億七百二十四萬六千四十二積日二億五千九百九十六萬九千四百一十六大餘三十六小餘二萬二千四十二大餘命甲子小餘以刻法除之得庚子日五十六刻二百二分以奉元術推之積年八千三百一十八萬五千七十氣積分七百二十萬七百二十六億七千五百四十四萬四千一百一十閏餘三十一萬五千九百八十五朔積分七百二十萬七百二十六億七千五百一十二萬八千一百二十五積日三百三億八千二百八十一萬三千二百九十六大餘三十六小餘一萬二千九百二十五大餘命甲子小餘以刻法除之得庚子日五十四刻一百二十七分課於明天術少二刻是視明天術朔減二刻也八年閏四月壬寅注曰玉海云十二日右正言知制誥沈括上熙寧奉元秝行之詔進括一官賜朴錢百十以監生石道為靈臺郎括嘗稱朴精於秝術一行之流也春秋日蝕三十六諸秝通驗密者不過
