body:
  text: 商二十五又以右上一萬四千一百二十五除右下二萬六千三百七十五得一爲下商右下餘一萬二千二百五十以下商一乘左上二十六得二十六歸入左下一得左下二十七即棄去下商一又以右下一萬二千二百五十除右上一萬四千一百二十五得一爲上商右上餘一千八百七十五以上商一乘左下二十七得二十七歸入左上二十六得左上五十三即棄去上商一又以右上一千八百七十五除右下一萬二千二百五十得六爲下商右下餘一千以下商六乘左上五十三得三百一十八歸入左下二十七得左下三百四十五即棄去下商六又以右下一千除右上一千八百七十五得一爲上商右上餘八百七十五以上商一乘左下三百四十五得三百四十五歸入左上五十三得上上三百九十八即棄去上商一又以右上八百七十五除右下一千得一爲下商右下餘一百二十五以下商一乘左上三百九十八得三百九十八歸入左下三百四十五得左下七百四十三即棄去下商一又以右下一百二十五除右上八百七十五得六爲上商右上餘一百二十五以上商六乘左下七百四十三得四千四百五十八歸入左上三百九十八得左上四千八百五十六即棄去上商六驗右上右下俱一百二十五即以一百二十五爲等數左上四千八百五十六爲乘數以左上四千八百五十六與左下七百四十三相加得五千五百九十九爲蔀數以等數約閏縮得四千五百五十九以乘數乘之得二千二百一十三萬八千五百四滿蔀數去之餘五十八爲乘元數以乘氣元率得八千二百四十七萬六千爲朔積年以八元歲加之得八千三百一十八萬五千八十爲上元甲子距熙寕七年甲寅後甲子積年減十年餘八千三百一十八萬五千七十爲上元甲子距熙寕七年甲寅積年以上演紀法出宋秦九韶數書如是反覆推求知今所補奉元術歲周朔實確無可疑歲周三百六十五日餘五千七百七十三朔策二十九餘一萬二千五百七十五望策一十四餘一萬八千一百三十七半
