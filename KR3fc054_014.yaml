body:
  text: 加元法而減之命大餘甲子算外即得所求年前天正經朔日辰及餘求弦望及次朔經日置天正經朔大小餘以弦策纍加之命如前即得弦望及次朔經日日辰及餘求沒日置有沒之氣小餘二十四氣小餘在沒限以上者為有沒之氣以秒母乘之其秒從之用減歲周餘以歲餘除之為沒日不滿為餘以沒日加其氣大餘命甲子算外即其氣沒日日辰求滅日置有滅之經朔小餘經朔小餘不滿朔虛分者為有滅之朔以三十乘之滿朔虛分為滅日不滿為餘以滅日加經朔大餘命甲子算外即其月滅日日辰步發斂術候策五餘一千七百二十六秒五封策六餘二千七十一秒七十八土王策三餘一千三十五秒二百一十九辰法一千九百七十五半辰法九百八十七半刻法二百三十七秒母三百六十求七十二候各置中節大小餘命之為初候以候策
