body:
  text: 得二十六七唯一行得二十九朴乃得三十五唯莊公十八年一蝕今古算皆不入蝕法疑前史誤耳自夏仲康五年癸巳歲至熙寧六年癸丑凡三千二百一年書傳所載日食凡四百七十五衆秝考驗雖各有得失而朴所得為多朴欲造候簿其法須測驗每夜昏曉夜半月及五星所在度秒置簿録之滿五年其間剔去雲陰及晝見日數外可得三年實行然後以算日綴之古所謂綴術者此也秝官沮之不成奉元秝五星步術但增損舊秝正其甚謬處十得五六而已九年正月二十七日括請令司天用渾儀浮漏圭表測驗令朴參校新秝改正從之先是括典領修秝載今月望月食不驗故也元豐元年十二月辛丑朔詔提舉司天監集秝官考算遼高麗日本國與奉元秝同異注日以上采玉海夢溪筆談紹興九年史官重修神宗正史求奉元秝不獲八月丙子注曰玉海云二十九日詔陳得一裴伯壽赴闕補修之注曰以上采宋史玉海熙寧奉元秝注曰以下今補修步氣朔術演紀上元甲子歲距熙寧七年甲寅歲積八千三百一十八萬五千七十算外上驗往古每年減一算下算將來每年加一算注曰
  hash: sha256:6cb1ff81a83e43922a3a33da5b702bdc308d75a9bbedc3c6b24c522c2d05c59c
